<svg xmlns="http://www.w3.org/2000/svg" width="100" height="145" viewBox="0 0 100 145">
  <!-- North arrow: filled black upper half, white lower half, circle center, N label -->
  <!-- Upper (north) half — black fill -->
  <polygon points="50,2 62,72 50,65 38,72" fill="#000000"/>
  <!-- Lower (south) half — white fill with black stroke -->
  <polygon points="50,128 62,72 50,65 38,72" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <!-- Center circle -->
  <circle cx="50" cy="72" r="6" fill="#000000"/>
  <!-- N label -->
  <text x="50" y="143" text-anchor="middle" font-family="Arial" font-weight="bold"
        font-size="18" fill="#000000">N</text>
</svg>
