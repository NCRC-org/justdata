<div id="dotlender-filters" class="dl-container" style="display:flex; flex-direction:column; max-width:1400px; margin:0 auto; padding:15px; gap:15px;">

  <!-- Sidebar -->
  <aside class="dl-controls-sidebar">
    <div class="dl-mapper-controls">

      <!-- App header -->
      <div style="text-align:center; margin-bottom:12px; padding-bottom:10px; border-bottom:2px solid var(--ncrc-navy);">
        <h2 style="color:var(--ncrc-navy); font-size:1.1rem; margin:0; font-weight:700;">
          <i class="fas fa-map-marked-alt" style="color:var(--ncrc-secondary-blue);"></i>
          DotLender
        </h2>
        <p style="font-size:0.75rem; color:#666; margin:4px 0 0;">HMDA dot-density lending map</p>
      </div>

      <!-- Geography type -->
      <div class="control-group" style="margin-bottom:10px;">
        <label class="control-group-label">Geography Type</label>
        <select id="dl-geo-type">
          <option value="metro" selected>Metro Area (MSA)</option>
          <option value="state">State</option>
        </select>
      </div>

      <!-- Geography search -->
      <div class="control-group" style="margin-bottom:6px; position:relative;">
        <label class="control-group-label">Search Geography</label>
        <input type="text" id="dl-geo-search" placeholder="Type to search..." autocomplete="off" />
        <div id="dl-geo-suggestions" style="display:none; position:absolute; z-index:1000; width:100%; top:100%;
             background:white; border:1px solid #ddd; border-radius:6px; box-shadow:0 2px 6px rgba(0,0,0,0.1); max-height:200px; overflow-y:auto;"></div>
      </div>

      <!-- Selected counties: scrollable checkbox list + N of M counter + select/deselect all -->
      <div style="margin-bottom:6px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
          <span style="font-size:0.78rem; color:#555;">
            <span id="dl-county-count">0</span> of <span id="dl-county-total">0</span> selected
          </span>
          <div style="display:flex; gap:6px;">
            <button type="button" id="dl-select-all-btn"
                    style="font-size:0.72rem; color:#4a90d9; background:none; border:none; cursor:pointer; padding:0;">
              Select All
            </button>
            <span style="color:#ddd;">|</span>
            <button type="button" id="dl-deselect-all-btn"
                    style="font-size:0.72rem; color:#4a90d9; background:none; border:none; cursor:pointer; padding:0;">
              Deselect All
            </button>
          </div>
        </div>
        <div id="dl-county-list"
             style="max-height:140px; overflow-y:auto; border:1px solid #ddd;
                    border-radius:6px; padding:6px 8px; background:white;
                    font-size:0.82rem;">
        </div>
      </div>
      <div id="dl-geo-error" style="display:none; color:#c00; font-size:0.78rem; margin-bottom:6px;"></div>

      <!-- Lender -->
      <div class="control-group" style="margin-bottom:10px; position:relative;">
        <label class="control-group-label">Lender</label>
        <input type="text" id="dl-lender-search" placeholder="All lenders (type to filter)" autocomplete="off" />
        <input type="hidden" id="dl-lender-lei" value="" />
        <div id="dl-lender-suggestions" style="display:none; position:absolute; z-index:1000; width:100%; top:100%;
             background:white; border:1px solid #ddd; border-radius:6px; box-shadow:0 2px 6px rgba(0,0,0,0.1); max-height:200px; overflow-y:auto;"></div>
      </div>

      <!-- Year range -->
      <div class="control-group" style="margin-bottom:10px;">
        <label class="control-group-label">Year Range</label>
        <div style="display:flex; gap:6px; align-items:center;">
          <select id="dl-year-start" style="flex:1;"></select>
          <span style="color:#666; font-size:0.8rem;">to</span>
          <select id="dl-year-end" style="flex:1;"></select>
        </div>
      </div>

      <!-- Overlay mode -->
      <div class="control-group" style="margin-bottom:10px;">
        <label class="control-group-label">
          Choropleth Overlay
          <span id="dl-choropleth-spinner" class="dl-spinner"
                style="visibility:hidden; margin-left:6px;"></span>
        </label>
        <select id="dl-overlay-mode">
          <option value="minority" selected>Minority Population</option>
          <option value="income">Income Band</option>
          <option value="none">No Overlay</option>
          <optgroup label="Race / Ethnicity">
            <option value="race_black">% Black</option>
            <option value="race_hispanic">% Hispanic</option>
            <option value="race_black_hispanic">% Black &amp; Hispanic Combined</option>
            <option value="race_asian">% Asian</option>
            <option value="race_ai_an">% American Indian &amp; Alaska Native</option>
            <option value="race_nh_opi">% Native Hawaiian &amp; Pacific Islander</option>
            <option value="race_white">% White</option>
          </optgroup>
        </select>
      </div>

      <!-- Breakpoints panel. Sits directly below the overlay dropdown so
           the user sees it next to whatever overlay they're tuning. Hidden
           by default; revealed by window.dotlenderSetBreakpoints when the
           overlay mode is minority or race_*. -->
      <div id="dl-race-breakpoints-panel"
           style="display:none; margin-bottom:10px; padding:10px;
                  background:#f8f9fa; border-radius:6px; border:1px solid #e0e6ed;">
        <div style="font-size:0.78rem; font-weight:700; color:#1a3a6e;
                    text-transform:uppercase; letter-spacing:0.4px; margin-bottom:8px;">
          Breakpoints
          <span id="dl-bp-overlay-label" style="font-weight:400; text-transform:none;
                font-size:0.75rem; color:#666;"></span>
        </div>
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
          <label style="font-size:0.8rem; color:#444;">Number of breaks:</label>
          <select id="dl-bp-count"
                  style="font-size:0.8rem; padding:3px 6px; border-radius:4px; border:1px solid #ccc;">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>
        <div id="dl-bp-inputs" style="display:flex; flex-direction:column; gap:6px;"></div>
        <button id="dl-bp-apply" type="button"
                style="margin-top:10px; padding:5px 14px; font-size:0.82rem;
                       background:#1a3a6e; color:#fff; border:none; border-radius:4px;
                       cursor:pointer; width:100%;">
          Apply Breakpoints
        </button>
        <div style="margin-top:6px; font-size:0.72rem; color:#888;">
          Edit thresholds, 0–100%, then click Apply.
        </div>
      </div>

      <!-- Dot density -->
      <div class="control-group" style="margin-bottom:10px;">
        <label class="control-group-label">
          Dot Density
          <span style="font-weight:normal; color:#888; font-size:0.7rem; text-transform:none; letter-spacing:normal;" id="dl-density-label"> — 1 dot per loan</span>
        </label>
        <div class="dl-density-input-group">
          <button type="button" class="dl-density-btn" id="dl-density-down" title="Fewer dots">−</button>
          <input type="number" id="dl-density-value" value="1" min="1" max="999" />
          <button type="button" class="dl-density-btn" id="dl-density-up" title="More dots">+</button>
          <span style="font-size:0.78rem; color:#888; margin-left:4px;">loans/dot</span>
        </div>
        <p style="font-size:0.72rem; color:#aaa; margin:3px 0 0;">
          Housing-unit normalization pending ACS load.
        </p>
      </div>

      <!-- Race / ethnicity filter (collapsible) -->
      <div class="control-group" style="margin-bottom:10px;">
        <label class="control-group-label" style="cursor:pointer;" id="dl-race-toggle">
          Dot Color by Race
          <i class="fas fa-chevron-right" id="dl-race-chevron" style="float:right; font-size:0.7rem; margin-top:3px;"></i>
        </label>
        <div id="dl-race-filters" style="display:none; margin-top:6px;">
          <label class="dl-race-item">
            <input type="checkbox" class="dl-race-cb" id="dl-race-all" value="all" checked style="margin:0;">
            <span class="dl-race-dot" style="background:#222;"></span> All races (black)
          </label>
          <label class="dl-race-item">
            <input type="checkbox" class="dl-race-cb" id="dl-race-hispanic" value="Hispanic or Latino" style="margin:0;">
            <span class="dl-race-dot" style="background:#e41a1c;"></span> Hispanic or Latino
          </label>
          <label class="dl-race-item">
            <input type="checkbox" class="dl-race-cb" id="dl-race-black" value="Black or African American" style="margin:0;">
            <span class="dl-race-dot" style="background:#377eb8;"></span> Black or African American
          </label>
          <label class="dl-race-item">
            <input type="checkbox" class="dl-race-cb" id="dl-race-asian" value="Asian" style="margin:0;">
            <span class="dl-race-dot" style="background:#4daf4a;"></span> Asian
          </label>
          <label class="dl-race-item">
            <input type="checkbox" class="dl-race-cb" id="dl-race-white" value="White" style="margin:0;">
            <span class="dl-race-dot" style="background:#a65628;"></span> White
          </label>
          <label class="dl-race-item">
            <input type="checkbox" class="dl-race-cb" id="dl-race-other" value="other" style="margin:0;">
            <span class="dl-race-dot" style="background:#999;"></span> Other / Unknown
          </label>
        </div>
      </div>

      <!-- Map overlay toggles -->
      <div class="control-group" style="margin-bottom:10px;">
        <label class="control-group-label">Map Overlays</label>
        <label class="dl-race-item">
          <input type="checkbox" id="dl-show-county-boundary" checked style="margin:0;">
          <span>Clip Area</span>
        </label>
      </div>

      <!-- City boundaries: per-city checkbox list, populated after each render -->
      <div id="dl-city-boundary-section" style="margin-top:8px; margin-bottom:10px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
          <label class="control-group-label" style="margin:0; padding:0; border:none;">
            City Boundaries
          </label>
          <div style="display:flex; gap:6px;">
            <button type="button" id="dl-city-select-all-btn"
                    style="font-size:0.72rem; color:#4a90d9; background:none; border:none; cursor:pointer; padding:0;">
              Show All
            </button>
            <span style="color:#ddd;">|</span>
            <button type="button" id="dl-city-deselect-all-btn"
                    style="font-size:0.72rem; color:#4a90d9; background:none; border:none; cursor:pointer; padding:0;">
              Hide All
            </button>
          </div>
        </div>
        <div id="dl-city-list"
             style="max-height:140px; overflow-y:auto; border:1px solid #ddd;
                    border-radius:6px; padding:6px 8px; background:white;
                    font-size:0.82rem;">
          <div style="color:#999; font-style:italic; font-size:0.78rem;">
            Render a map to see available cities
          </div>
        </div>
      </div>

      <!-- Advanced filters -->
      <div class="control-group" style="margin-bottom:10px;">
        <label class="control-group-label" style="cursor:pointer;" id="dl-advanced-toggle">
          Advanced Filters
          <i class="fas fa-chevron-right" id="dl-advanced-chevron" style="float:right; font-size:0.7rem; margin-top:3px;"></i>
        </label>
        <div id="dotlender-advanced-filters" style="display:none; margin-top:6px;">
          <div style="margin-bottom:6px;">
            <label style="font-size:0.78rem; color:#555;">Loan Purpose</label>
            <select id="dl-loan-purpose" style="width:100%;">
              <option value="1" selected>Home purchase</option>
              <option value="31">Refinancing</option>
              <option value="32">Cash-out refinancing</option>
              <option value="2">Home improvement</option>
              <option value="all">All purposes</option>
            </select>
          </div>
          <div style="margin-bottom:6px;">
            <label style="font-size:0.78rem; color:#555;">Action Taken</label>
            <select id="dl-action-taken" style="width:100%;">
              <option value="1" selected>Originated</option>
              <option value="3">Denied</option>
              <option value="all">All actions</option>
            </select>
          </div>
          <div style="margin-bottom:6px;">
            <label style="font-size:0.78rem; color:#555;">Lien Status</label>
            <select id="dl-lien-status" style="width:100%;">
              <option value="1" selected>First lien</option>
              <option value="2">Subordinate lien</option>
              <option value="all">All</option>
            </select>
          </div>
          <div style="margin-bottom:6px;">
            <label style="font-size:0.78rem; color:#555;">Occupancy Type</label>
            <select id="dl-occupancy-type" style="width:100%;">
              <option value="1" selected>Principal residence</option>
              <option value="2">Second residence</option>
              <option value="3">Investment property</option>
              <option value="all">All</option>
            </select>
          </div>
          <div style="margin-bottom:6px;">
            <label style="font-size:0.78rem; color:#555;">Construction Method</label>
            <select id="dl-construction-method" style="width:100%;">
              <option value="1" selected>Site-built</option>
              <option value="2">Manufactured home</option>
              <option value="all">All</option>
            </select>
          </div>
          <div style="margin-bottom:6px;">
            <label style="font-size:0.78rem; color:#555;">Total Units</label>
            <select id="dl-total-units" style="width:100%;">
              <option value="1234" selected>1–4 units</option>
              <option value="all">All</option>
            </select>
          </div>
          <div style="margin-bottom:6px;">
            <label style="font-size:0.78rem; color:#555;">Reverse Mortgage</label>
            <select id="dl-reverse-mortgage" style="width:100%;">
              <option value="exclude" selected>Exclude</option>
              <option value="include">Include</option>
            </select>
          </div>

        </div>
      </div>

      <!-- Render button -->
      <button id="dl-render-btn" type="button"
              style="width:100%; padding:10px; background:var(--ncrc-navy); color:white; border:none;
                     border-radius:6px; font-size:0.9rem; font-weight:600; cursor:pointer; margin-bottom:10px;">
        <span id="dl-render-spinner" class="dl-spinner"
              style="display:none; margin-right:6px;"></span>
        <i class="fas fa-map"></i> Render Map
      </button>

      <!-- Build PDF -->
      <button id="dl-build-report-btn" type="button"
              style="width:100%; padding:8px; background:white; color:var(--ncrc-navy);
                     border:2px solid var(--ncrc-navy); border-radius:6px; font-size:0.85rem;
                     font-weight:600; cursor:pointer; display:none;">
        <span id="dl-pdf-spinner" class="dl-spinner"
              style="display:none; margin-right:6px;"></span>
        <i class="fas fa-file-pdf"></i> Build PDF Report
      </button>

      <!-- Summary stats -->
      <div id="dl-summary-stats" style="display:none; margin-top:12px; padding-top:10px;
           border-top:1px solid #eee; font-size:0.82rem; color:#444;">
        <div id="dl-stats-content"></div>
      </div>

    </div><!-- /.dl-mapper-controls -->
  </aside><!-- /.dl-controls-sidebar -->

  <!-- Map content -->
  <div class="dl-content-wrapper">
    <div class="dl-mapper-container">
      <div class="dl-map-container" style="position:relative;">
        <div id="dotlender-map"></div>
        <div id="dl-overlay-title"></div>
        <div id="dl-overlay-logo">
          <img src="/static/img/ncrc-logo-color.png" style="height:32px; opacity:0.85;" alt="NCRC" />
        </div>
        <div id="dl-overlay-legend"></div>
      </div>
      <div id="dl-map-error" style="display:none; color:#c00; padding:8px; font-size:0.85rem;"></div>
    </div>
  </div>

</div><!-- /.dl-container -->

<!-- Desktop side-by-side layout — applied here so it doesn't leak past dotlender -->
<style>
  @media (min-width: 992px) {
    .dl-container {
      flex-direction: row !important;
      align-items: flex-start !important;
    }
  }
</style>
