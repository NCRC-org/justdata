    <!-- Firms Modal -->
    <div id="modal-firms" class="modal-overlay" onclick="if(event.target===this)closeModal('firms')">

            <div class="modal-header">
                <h3>All Financial Sector Firms</h3>
                <button class="modal-close" onclick="closeModal('firms')">&times;</button>
            </div>
            <div class="modal-body">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Firm</th>
                            <th>Sector</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="modal-firms-body">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
