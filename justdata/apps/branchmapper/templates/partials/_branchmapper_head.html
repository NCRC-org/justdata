    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BranchMapper - Bank Branch Location Map</title>
    <meta name="description" content="Interactive map showing bank branch locations with demographic and deposit data.">
    
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Mapbox GL JS CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet" />
    <!-- Mapbox GL Draw CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css" rel="stylesheet" />
    <!-- Mapbox GL Geocoder CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.css" rel="stylesheet" />
    
    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- Shared CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* Branch Mapper specific styles - Mobile-first responsive design */

        /* Geocoder search bar - fit inside sidebar */
        #geocoderContainer .mapboxgl-ctrl-geocoder {
            width: 100% !important;
            max-width: 100% !important;
            min-width: 0 !important;
            font-size: 0.85rem;
            box-shadow: none;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        #geocoderContainer .mapboxgl-ctrl-geocoder input[type="text"] {
            font-size: 0.85rem;
            padding: 6px 10px 6px 32px;
        }

        /* Geocoder boundary highlight */
        .geocoder-boundary-active {
            position: relative;
        }

        /* Main container - simple flexbox layout */
        .container {
            display: flex !important;
            flex-direction: column !important;
            max-width: 1400px !important;
            margin: 0 auto !important;
            padding: 15px !important;
            gap: 15px !important;
        }

        /* Controls sidebar - appears above map on all screen sizes */
        .controls-sidebar {
            width: 100% !important;
            max-width: 100% !important;
            order: 1;
        }

        /* Content wrapper with map */
        .content-wrapper {
            width: 100% !important;
            max-width: 100% !important;
            min-width: 0;
            overflow: hidden;
            order: 2;
        }

        .mapper-container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
            box-sizing: border-box;
        }

        .map-container {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        #branchMap {
            width: 100%;
            height: 500px;
            box-sizing: border-box;
            border-radius: 8px;
        }

        .map-overlay-logo {
            position: absolute;
            bottom: 30px;
            right: 10px;
            z-index: 3;
            background: transparent;
            padding: 6px 10px;
            pointer-events: none;
        }

        .map-overlay-title {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 3;
            background: rgba(255,255,255,0.92);
            border-radius: 6px;
            padding: 6px 12px;
            display: none;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ncrc-dark-blue, #003366);
            pointer-events: none;
            max-width: 60%;
        }

        .map-overlay-legend {
            position: absolute;
            bottom: 16px;
            left: 14px;
            z-index: 3;
            background: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 6px;
            padding: 10px 14px;
            display: none;
            font-size: 0.75rem;
            color: #666;
        }

        .map-overlay-legend strong {
            font-size: 0.85rem;
            color: var(--ncrc-dark-blue, #003366);
        }

        .map-overlay-legend .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }

        .map-overlay-legend .legend-swatch {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 1px solid #333;
        }

        /* Desktop layout - side by side */
        @media (min-width: 992px) {
            .container {
                flex-direction: row !important;
                align-items: flex-start !important;
            }

            .controls-sidebar {
                width: 300px !important;
                min-width: 300px !important;
                max-width: 300px !important;
                position: sticky !important;
                top: 20px !important;
                order: 1;
                max-height: calc(100vh - 40px);
                overflow-y: auto;
            }

            .content-wrapper {
                flex: 1 !important;
                order: 2;
            }

            #branchMap {
                height: 600px;
            }
        }

        /* Tablet layout */
        @media (min-width: 768px) and (max-width: 991px) {
            .controls-sidebar {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
            }

            .controls-sidebar .mapper-controls {
                flex: 1;
                min-width: 280px;
            }

            #branchMap {
                height: 450px;
            }
        }

        /* Mobile layout */
        @media (max-width: 767px) {
            .container {
                padding: 10px !important;
                gap: 10px !important;
            }

            #branchMap {
                height: 350px;
            }

            .mapper-controls {
                padding: 10px !important;
            }

            .control-group label {
                font-size: 0.8rem;
            }

            .control-group select {
                font-size: 0.9rem;
                padding: 8px;
            }

            .map-actions button {
                padding: 10px 12px;
                font-size: 0.85rem;
            }
        }

        /* Hide any right sidebar completely */
        .sidebar:not(.controls-sidebar) {
            display: none !important;
        }
        
        .mapper-controls {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            padding: 12px;
            margin-bottom: 12px;
        }
        
        /* Left sidebar controls - single column layout */
        .sidebar-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Remove the old 3-column grid */
        .controls-grid {
            display: none;
        }
        
        .map-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }
        
        .map-actions button {
            width: 100%;
            padding: 8px 14px;
            background: var(--ncrc-primary-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        .map-actions button:hover {
            background: var(--ncrc-dark-blue);
        }
        
        .map-actions button.secondary {
            background: #6c757d;
        }
        
        .map-actions button.secondary:hover {
            background: #5a6268;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .control-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ncrc-dark-blue);
        }
        
        .control-group select {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.85rem;
            background: white;
        }
        
        .control-group select[multiple] {
            min-height: 150px;
            max-height: 200px;
            padding: 6px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        
        .control-group select[multiple]:focus {
            border-color: var(--ncrc-primary-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(3, 78, 160, 0.1);
        }
        
        .bank-select-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .bank-select-help {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        
        .selected-banks-display {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }
        
        .selected-bank-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: var(--ncrc-light-blue);
            color: var(--ncrc-dark-blue);
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .selected-bank-tag .remove-btn {
            cursor: pointer;
            color: var(--ncrc-dark-blue);
            font-weight: bold;
            padding: 0 2px;
        }
        
        .selected-bank-tag .remove-btn:hover {
            color: #e82e2e;
        }

        /* Bank chip styles */
        .bank-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
        }

        .bank-chip .chip-remove {
            cursor: pointer;
            font-weight: bold;
            padding: 0 2px;
            opacity: 0.8;
        }

        .bank-chip .chip-remove:hover {
            opacity: 1;
        }

        /* Hide mapbox-gl-draw default toolbar (we use our own sidebar buttons) */
        .mapboxgl-ctrl-group.mapbox-gl-draw_ctrl-draw-btn {
            display: none !important;
        }
        .mapbox-gl-draw_ctrl-draw-btn {
            display: none !important;
        }

        /* Show All Banks button active state */
        #showAllBanksBtn.active {
            background: var(--ncrc-primary-blue) !important;
            cursor: pointer !important;
            opacity: 1 !important;
        }

        #showAllBanksBtn:not(:disabled):hover {
            background: var(--ncrc-dark-blue) !important;
        }

        /* Search results dropdown items */
        .bank-search-item {
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .bank-search-item:hover {
            background: #e6f2ff;
        }

        .bank-search-item:last-child {
            border-bottom: none;
        }

        .control-group small {
            font-size: 0.7rem;
            color: #666;
            margin-top: 2px;
        }
        
        
        .map-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            padding: 12px;
            margin-bottom: 12px;
        }
        
        #branchMap {
            height: 600px;
            width: 100%;
            border: 2px solid #ddd;
            border-radius: 6px;
        }
        
        
        .info-panel {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 8px 12px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
        }
        
        .info-panel strong {
            color: var(--ncrc-dark-blue);
        }
        
        /* Custom marker popup styles */
        .mapboxgl-popup-content {
            min-width: 200px;
            padding: 12px;
            border-radius: 8px;
        }
        .mapboxgl-popup-close-button {
            font-size: 18px;
            padding: 4px 8px;
        }
        
        .popup-content {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .popup-content .bank-name-header {
            color: #000;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .popup-content .branch-info {
            margin: 5px 0;
        }

        .popup-content .branch-info strong {
            color: var(--ncrc-primary-blue);
        }
        
        .popup-content .branch-tags {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        
        .tag {
            display: inline-block;
            padding: 3px 8px;
            background: #e6f2ff;
            color: var(--ncrc-primary-blue);
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
            margin-top: 5px;
        }
        
        .tag.lmi {
            background: #fff3cd;
            color: #856404;
        }
        
        .tag.minority {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .report-problem-btn {
            margin-top: 12px;
            padding: 8px 16px;
            background: #e82e2e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            text-align: center;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        
        .report-problem-btn:hover {
            background: #c41e1e;
            color: white;
            text-decoration: none;
        }
        
        .report-problem-btn i {
            margin-right: 6px;
        }
        
        /* Explicitly hide any version text in footer */
        .footer .version-text,
        .footer-bottom .version-text,
        footer .version-text {
            display: none !important;
            visibility: hidden !important;
        }

        /* View Mode Toggle */
        .view-mode-toggle {
            display: flex;
            gap: 0;
            border: 2px solid var(--ncrc-primary-blue);
            border-radius: 6px;
            overflow: hidden;
        }

        .mode-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: white;
            color: var(--ncrc-dark-blue);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .mode-btn.active {
            background: var(--ncrc-primary-blue);
            color: white;
        }

        .mode-btn:hover:not(.active) {
            background: #e6f2ff;
        }

        .oscr-event-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .oscr-event-tag.opening {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .oscr-event-tag.closing {
            background: #ffebee;
            color: #c62828;
        }

        /* Census Tract Toggle (3-button group) */
        .tract-overlay-toggle {
            display: flex;
            gap: 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
        }

        .tract-btn {
            flex: 1;
            padding: 6px 8px;
            border: none;
            background: white;
            color: #666;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .tract-btn.active {
            background: var(--ncrc-primary-blue);
            color: white;
        }

        .tract-btn:hover:not(.active) {
            background: #e6f2ff;
        }

        /* County boundary layer styling */
        .county-boundary-label {
            font-size: 11px;
            font-weight: 600;
            color: #333;
        }

        /* Mobile responsive: Tablet (768-1024px) */
        @media (min-width: 768px) and (max-width: 1024px) {
            .container {
                flex-direction: column !important;
            }
            .controls-sidebar {
                width: 100% !important;
                max-width: 100% !important;
                min-width: 0 !important;
                position: relative !important;
                top: auto !important;
            }
            .sidebar-controls {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .sidebar-controls .map-actions,
            .sidebar-controls #column2Legend {
                grid-column: 1 / -1;
            }
        }

        /* Mobile (<768px) */
        @media (max-width: 767px) {
            #branchMap {
                height: 60vh;
            }
            .controls-sidebar {
                position: relative !important;
                top: auto !important;
            }
            .mapper-controls {
                padding: 10px !important;
            }
        }

        /* Small mobile (<480px) */
        @media (max-width: 480px) {
            #branchMap {
                height: 50vh;
            }
            .control-group label {
                font-size: 0.78rem;
            }
            .control-group select,
            .control-group input[type="text"] {
                font-size: 0.82rem;
                padding: 5px 8px;
            }
            .map-actions button {
                padding: 8px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
